search:
  city: "Казань"
  max_price: 11000000
  rooms: [2, 3]
  exclude_first_floor: true
  exclude_last_floor: true
  geojson_path: "data/search_zone.geojson"

  districts:
    - "Вахитовский"
    - "Советский"
    - "Ново-Савиновский"
    - "Кировский"

scraper:
  poll_interval_minutes: 10
  request_delay_seconds: 2
  max_pages_per_source: 3
  timeout_seconds: 30

sources:
  cian:
    enabled: true
    region_id: 4777
  avito:
    enabled: true
    location_id: 650400
  domclick:
    enabled: true
    # ФИАС города Казань — если suggests API недоступен
    kazan_address_guid: "93b3df57-79b4-4b59-8e81-04924d5c4ae1"
    kazan_bbox:
      sw_lat: 55.73
      sw_lon: 49.06
      ne_lat: 55.84
      ne_lon: 49.23
